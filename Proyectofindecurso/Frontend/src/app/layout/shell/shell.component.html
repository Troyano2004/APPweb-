
<div class="shell" [class.is-collapsed]="isCollapsed">
  <aside class="sidebar" [class.collapsed]="isCollapsed" [class.mobile-open]="isMobileOpen">
    <div class="sidebar-header">
      <div class="brand">
        <span class="brand-icon">GPT</span>
        <div class="brand-text" *ngIf="!isCollapsed">
          <strong>Gestión del Proceso</strong>
          <span>de Titulación</span>
        </div>
      </div>
      <button class="collapse-toggle" type="button" (click)="toggleCollapse()">
        {{ isCollapsed ? '»' : '«' }}
      </button>
    </div>

    <nav class="menu">
      <div class="menu-section" *ngFor="let section of menuSections; let i = index">
        <button class="section-title" type="button" (click)="toggleSection(i)">
          <span class="section-icon">{{ section.icon }}</span>
          <span class="section-text" *ngIf="!isCollapsed">{{ section.title }}</span>
          <span class="chevron" [class.open]="openSectionIndex === i" *ngIf="!isCollapsed">▾</span>
        </button>
        <div class="section-items" [class.open]="openSectionIndex === i" [class.collapsed]="isCollapsed">
          <a *ngFor="let menuItem of itemsVisibles(section)"
             [routerLink]="menuItem.path"
             routerLinkActive="active"
             (click)="closeMobile()">
            <span class="bullet"></span>
            <span class="item-text">{{ menuItem.label }}</span>
          </a>
        </div>
      </div>
    </nav>
  </aside>

  <div class="overlay" *ngIf="isMobileOpen" (click)="closeMobile()"></div>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-button mobile-only" type="button" (click)="toggleMobile()">☰</button>
        <div class="breadcrumb">{{ breadcrumb }}</div>
        <div class="module-title">{{ currentTitle }}</div>
      </div>

      <div class="topbar-center">
        <div class="search-box" [class.active]="searchFocused">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            class="search-input"
            placeholder="Buscar módulo..."
            [(ngModel)]="searchQuery"
            (focus)="searchFocused = true; updateSearchResults()"
            (blur)="onSearchBlur()"
            (input)="updateSearchResults()"
            (keydown.enter)="navigateToFirst()"
            (keydown.escape)="clearSearch()"
            autocomplete="off"
          />
          <button
            *ngIf="searchQuery"
            class="search-clear"
            type="button"
            (mousedown)="$event.preventDefault()"
            (click)="clearSearch()"
          >✕</button>

          <div class="search-dropdown" *ngIf="searchFocused && searchResults.length > 0">
            <a *ngFor="let result of searchResults"
               class="search-result"
               [routerLink]="result.path"
               (mousedown)="$event.preventDefault()"
               (click)="onResultClick()">
              <span class="result-icon">{{ result.icon }}</span>
              <div class="result-info">
                <span class="result-label">{{ result.label }}</span>
                <span class="result-section">{{ result.section }}</span>
              </div>
            </a>
          </div>

          <div class="search-dropdown search-empty"
               *ngIf="searchFocused && searchQuery && searchResults.length === 0">
            <span>Sin resultados para "{{ searchQuery }}"</span>
          </div>
        </div>
      </div>

      <div class="topbar-right">
        <button
          class="icon-button"
          type="button"
          (click)="toggleTheme()"
          [title]="isDarkMode ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
        >{{ isDarkMode ? '☀️' : '🌙' }}</button>
        <button class="icon-button" type="button">🔔</button>
        <div class="avatar">
          <span class="avatar-circle">AG</span>
          <div class="avatar-info">
            <strong>{{ userName }}</strong>
            <span>{{ userRole }}</span>
          </div>
        </div>
        <button class="logout" type="button" (click)="logout()">Cerrar sesión</button>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
