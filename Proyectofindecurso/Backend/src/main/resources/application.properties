# ================================
# CONEXIËN A POSTGRESQL
# ================================
spring.datasource.url=jdbc:postgresql://localhost:5432/GestionTitulacion
spring.datasource.username=auth_reader
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / HIBERNATE
# ================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================================
# FLYWAY
# ================================
spring.flyway.baseline-on-migrate=true

# ================================
# AZURE BLOB STORAGE
# ================================
#azure.storage.connection-string=DefaultEndpointsProtocol=https;AccountName=titulacionstorage2026;AccountKey=XXXXXXXX;EndpointSuffix=core.windows.net
azure.storage.container-name=imagenes

# ================================
# HIKARI (POOL DE CONEXIONES)
# ================================
spring.datasource.hikari.pool-name=POOL_DEFAULT
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.data-source-properties.ApplicationName=BACKEND_TITU_DEFAULT

# ================================
# SESSION
# ================================
server.servlet.session.cookie.http-only=true
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# ================================
# GEMINI API
# ================================
#gemini.api.key=XXXXXXXX
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# ================================
# GMAIL SMTP
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
#spring.mail.username=elianmendoza724@gmail.com
#spring.mail.password=XXXXXXXX

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

